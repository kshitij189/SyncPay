services:
  # Backend Service
  - type: web
    name: syncpay-backend
    env: docker
    repo: https://github.com/kshitij189/SyncPay
    rootDir: backend
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromContext: true
      - key: GEMINI_API_KEY
        fromContext: true
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://syncpay.onrender.com # Change this if your frontend name is different

  # Frontend Static Site
  - type: static
    name: syncpay
    env: static
    repo: https://github.com/kshitij189/SyncPay
    rootDir: frontend
    plan: free
    region: singapore
    publishDir: build
    buildCommand: npm install && npm run build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: syncpay-backend
          property: host
      - key: REACT_APP_GOOGLE_CLIENT_ID
        fromContext: true
